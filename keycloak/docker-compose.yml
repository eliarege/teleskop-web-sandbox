services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    command: ["start-dev"]
    ports:
      - 8080:8080
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: password
    extra_hosts:
      - host.docker.internal:host-gateway

  keycloak-token-inspector:
    build: ./keycloak-token-inspector
    ports:
      - 8082:8082
