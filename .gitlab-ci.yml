stages:
  - prepare
  - release
  - deploy

.docker-login: &docker-login
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

.prepare-ssh: &prepare-ssh
  # Install ssh-agent
  - 'command -v ssh-agent >/dev/null || ( apt-get update -y && apt-get install openssh-client -y )'
  # Run ssh-agent
  - eval $(ssh-agent -s)
  # # Give the right permissions, otherwise ssh-add will refuse to add files
  # # Add the SSH key stored in SSH_PRIVATE_KEY file type CI/CD variable to the agent store
  - chmod 400 "$SSH_PRIVATE_KEY"
  - ssh-add "$SSH_PRIVATE_KEY"
  # # Create the SSH directory and give it the right permissions
  - mkdir -p ~/.ssh
  - chmod 700 ~/.ssh
  # # Copy known hosts file to SSH directory
  - cp "$SSH_KNOWN_HOSTS" ~/.ssh/known_hosts
  - chmod 644 ~/.ssh/known_hosts

.app-rules:
  rules:
    - if: $CI_COMMIT_TAG == "staging"
    - if: $CI_COMMIT_TAG =~ /^v/

.devops-rules:
  rules:
    - if: $CI_COMMIT_TAG =~ /^devops@/

.merge-request-rules:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == $CI_DEFAULT_BRANCH

# Instance level authentication, sets global `.npmrc`
.npm-registry-global-auth: &npm-registry-global-auth
  - echo "@${CI_PROJECT_ROOT_NAMESPACE}:registry=${CI_API_V4_URL}/packages/npm/" >> $(npm config get userconfig)
  - echo "${CI_API_V4_URL#http*:}/packages/npm/:_authToken=\${CI_JOB_TOKEN}" >> $(npm config get userconfig)

# Instance level authentication, sets `.npmrc` at current directory
.npm-registry-local-auth: &npm-registry-local-auth
  - echo "@${CI_PROJECT_ROOT_NAMESPACE}:registry=${CI_API_V4_URL}/packages/npm/" >> .npmrc
  - echo "${CI_API_V4_URL#http*:}/packages/npm/:_authToken=\${CI_JOB_TOKEN}" >> .npmrc

workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

variables:
  TARGET_APPS:
    value: dispensing-manager-ui dispensing-management-systems machine-status machines multi-monitor planning-board planning-board-engine root websockify
    description: Whitespace seperated list of apps to build/release

prepare-apps:
  image: node:20
  stage: prepare
  extends:
    - .app-rules
  script:
    - npm install -g turbo
    - |
      for APP_NAME in $TARGET_APPS; do
        turbo prune --scope=$APP_NAME --out-dir out-$APP_NAME --docker
      done
  artifacts:
    paths:
      - out-*/

merge-request-summarize:
  image: node:20
  stage: prepare
  extends:
    - .merge-request-rules
  before_script:
    - apt update && apt install -y jq git
    - *npm-registry-global-auth
    - corepack enable
  script:
    - git fetch origin $CI_MERGE_REQUEST_TARGET_BRANCH_NAME
    - npm install -g @eliarelektronik/merge-request-analyzer
    - export LATEST_TARGET_BRANCH_SHA=$(git log -n 1 --pretty=format:"%H" origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME)
    - |
      export REBASE_REQUIRED=$(
        if [[ $LATEST_TARGET_BRANCH_SHA != $CI_MERGE_REQUEST_DIFF_BASE_SHA ]];
          then echo true
          else echo false
        fi)
    - |
      export SHOULD_UPDATE_LOCKFILE=$(
        if [[ -n $(merge-request-analyzer should-update-lockfile $CI_MERGE_REQUEST_DIFF_BASE_SHA) ]];
          then echo true
          else echo false
        fi)
    - |
      jq --null-input \
        --arg apps $(merge-request-analyzer list-modified-apps $CI_MERGE_REQUEST_DIFF_BASE_SHA) \
        --argjson lockfile $SHOULD_UPDATE_LOCKFILE \
        --argjson rebase $REBASE_REQUIRED \
        '{ "modified-apps": $apps, "should-update-lockfile": $lockfile, "rebase-required": $rebase }' \
        > merge-request.summary.json
  artifacts:
    paths:
      - merge-request.summary.json

# TODO: Migrate this job to use `changesets`
release-devops-packages:
  image: node:20
  stage: release
  variables:
    NPM_TOKEN: $CI_JOB_TOKEN
  extends:
    - .devops-rules
  script:
    - apt update && apt install -y jq
    - corepack enable
    - npm install -g turbo
    # Authenticate
    - echo "@${CI_PROJECT_ROOT_NAMESPACE}:registry=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/npm/" >> .npmrc
    - echo "${CI_API_V4_URL#http*:}/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=\${CI_JOB_TOKEN}" >> .npmrc
    # Extract version segment from tag
    - export TAG_VERSION=${CI_COMMIT_TAG:7}
    # Publish all devops packages
    - |
      pnpm list --filter './devops/*' -r --depth -1 --json | grep --invert-match 'Failed to replace env' | jq -Mrc .[] | while read -r PKG; do
        OUT_DIR=out
        PKG_NAME=$(echo $PKG | jq -Mr .name)
        PKG_BASENAME=$(basename "$(echo $PKG | jq -Mr .path)")
        PKG_VERSION=$(echo $PKG | jq -Mr .version)
        PKG_BUILD_PATH=$OUT_DIR/devops/$PKG_BASENAME

        if [[ ! $PKG_NAME =~ ^@$CI_PROJECT_ROOT_NAMESPACE/ ]]; then
          echo "Invalid package scope! Packages must be scoped in the root namespace of the project, e.g. \"@${CI_PROJECT_ROOT_NAMESPACE}/$PKG_NAME\""
          echo 'For more information, see https://docs.gitlab.com/ee/user/packages/npm_registry/#package-naming-convention'
          exit 1
        fi

        if [[ "$(pnpm view ${PKG_NAME} versions)" != *"'${VERSION}'"* ]]; then
          turbo prune --scope=$PKG_NAME --out-dir $OUT_DIR
          pnpm install -C $OUT_DIR
          pnpm run -C $OUT_DIR build
          if [[ $PKG_VERSION != $TAG_VERSION ]]; then
            echo "Version of package '$PKG_NAME' does not match given tag name. Modifying published package.json."
            echo "Tag version: $TAG_VERSION, Package Version: $PKG_VERSION"
            tmp=$(mktemp)
            jq --arg version "$TAG_VERSION" '.version = $version' $PKG_BUILD_PATH/package.json > "$tmp"
            mv "$tmp" $PKG_BUILD_PATH/package.json
          fi
          pnpm publish --no-git-checks $PKG_BUILD_PATH
          rm -r $OUT_DIR
        else
          echo "Version ${TAG_VERSION} of ${PKG_NAME} has already been published, skipping."
        fi
      done

release-apps:
  stage: release
  tags: [docker]
  extends:
    - .app-rules
  variables:
    NPM_TOKEN: $CI_JOB_TOKEN
    TURBO_TOKEN: $TURBO_TOKEN
  before_script:
    - apk add --no-cache jq
    - *docker-login
  script:
    - mkdir release-logs
    - |
      for APP_NAME in $TARGET_APPS; do
        LOG_PATH="release-logs/$APP_NAME.log"
        ERR_PATH="release-logs/$APP_NAME.error.log"
        rm -rf out && mv out-$APP_NAME out
        {
          ./scripts/release.sh $APP_NAME 2>&1 || {
            export CI_ERROR=1
            mv $LOG_PATH $ERR_PATH
          }
        } | tee $LOG_PATH
      done
      if [ -n "$CI_ERROR" ]; then exit 1; fi;
  artifacts:
    name: $CI_COMMIT_TAG-$CI_PIPELINE_ID
    when: always
    paths:
      - release-logs/

deploy:
  image: ubuntu:22.04
  stage: deploy
  extends:
    - .app-rules
  environment: staging
  before_script:
    - *prepare-ssh
  script:
    - ssh eliar@$STAGING_HOST "docker compose --project-directory $STAGING_PROJECT_DIR pull"
    - ssh eliar@$STAGING_HOST "docker compose --project-directory $STAGING_PROJECT_DIR up -d"
