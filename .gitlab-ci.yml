stages:
  - prepare
  - release

.docker-login: &docker-login
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

workflow:
  rules:
    - if: $CI_COMMIT_TAG == "staging"

variables:
  TARGET_APPS: dispensing-manager-ui machines multi-monitor planning-board planning-board-engine root websockify

prepare:
  image: node:18
  stage: prepare
  script:
    - npm install -g turbo
    - |
      for APP_NAME in $TARGET_APPS; do
        npx turbo prune --scope=$APP_NAME --out-dir out-$APP_NAME --docker
      done
  artifacts:
    paths:
      - out-*/

release:
  stage: release
  tags: [docker]
  variables:
    NPM_TOKEN: $CI_JOB_TOKEN
    TURBO_TOKEN: $TURBO_TOKEN
  before_script:
    - apk add --no-cache jq
    - *docker-login
  script:
    - |
      for APP_NAME in $TARGET_APPS; do
        IMAGE_TAG=$CI_REGISTRY_IMAGE/$APP_NAME:$CI_COMMIT_TAG
        IMAGE_SHA=$CI_REGISTRY_IMAGE/$APP_NAME:$CI_COMMIT_SHA
        IMAGE_LATEST=$CI_REGISTRY_IMAGE/$APP_NAME:latest
        PKG_PATH=apps/$APP_NAME/package.json
        echo "Building $APP_NAME"
        rm -rf out && mv out-$APP_NAME out
        docker pull $IMAGE_LATEST || true
        docker build \
          --target $(jq -r .eliar.type $PKG_PATH) \
          --cache-from $IMAGE_LATEST \
          --build-arg APP_NAME="$APP_NAME" \
          --build-arg APP_VERSION="$IMAGE_TAG" \
          --build-arg APP_PORT=$(jq -r .eliar.port $PKG_PATH) \
          --build-arg APP_OUT_DIR=$(jq -r .eliar.outDir $PKG_PATH) \
          --build-arg TURBO_CONFIG="$TURBO_CONFIG" \
          --build-arg TURBO_FORCE="$TURBO_FORCE" \
          --label com.eliar.manifest.name=$APP_NAME \
          --label com.eliar.manifest.roles=$(jq -Mc .roles manifest.json 2> /dev/null || echo '[]') \
          --secret id=NPM_TOKEN \
          --secret id=TURBO_TOKEN \
        -t $IMAGE_TAG -t $IMAGE_SHA .
        docker push $IMAGE_TAG
        docker push $IMAGE_SHA
      done
