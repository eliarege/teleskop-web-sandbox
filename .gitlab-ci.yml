stages:
  - prepare
  - release
  - deploy

.docker-login: &docker-login
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

workflow:
  rules:
    - if: $CI_COMMIT_TAG == "staging"
    - if: $CI_COMMIT_TAG =~ /^v/

variables:
  TARGET_APPS: dispensing-manager-ui dispensing-management-systems machines multi-monitor planning-board planning-board-engine root websockify

prepare:
  image: node:20
  stage: prepare
  script:
    - npm install -g turbo
    - |
      for APP_NAME in $TARGET_APPS; do
        npx turbo prune --scope=$APP_NAME --out-dir out-$APP_NAME --docker
      done
  artifacts:
    paths:
      - out-*/

release:
  stage: release
  tags: [docker]
  variables:
    NPM_TOKEN: $CI_JOB_TOKEN
    TURBO_TOKEN: $TURBO_TOKEN
  before_script:
    - apk add --no-cache jq
    - *docker-login
  script:
    - mkdir release-logs
    - |
      for APP_NAME in $TARGET_APPS; do
        LOG_PATH="release-logs/$APP_NAME.log"
        ERR_PATH="release-logs/$APP_NAME.error.log"
        rm -rf out && mv out-$APP_NAME out
        {
          ./scripts/release.sh $APP_NAME 2>&1 || {
            export CI_ERROR=1
            mv $LOG_PATH $ERR_PATH
          }
        } | tee $LOG_PATH
      done
    - 'if [ -n "$CI_ERROR" ]; then exit 1; fi;'
  artifacts:
    name: $CI_COMMIT_TAG-$CI_PIPELINE_ID
    when: always
    paths:
      - release-logs/

deploy:
  image: ubuntu:22.04
  stage: deploy
  environment: staging
  before_script:
    # Install ssh-agent
    - 'command -v ssh-agent >/dev/null || ( apt-get update -y && apt-get install openssh-client -y )'
    # Run ssh-agent
    - eval $(ssh-agent -s)
    # # Give the right permissions, otherwise ssh-add will refuse to add files
    # # Add the SSH key stored in SSH_PRIVATE_KEY file type CI/CD variable to the agent store
    - chmod 400 "$SSH_PRIVATE_KEY"
    - ssh-add "$SSH_PRIVATE_KEY"
    # # Create the SSH directory and give it the right permissions
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    # # Copy known hosts file to SSH directory
    - cp "$SSH_KNOWN_HOSTS" ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - ssh $STAGING_HOST "docker compose --project-directory $STAGING_PROJECT_DIR pull"
    - ssh $STAGING_HOST "docker compose --project-directory $STAGING_PROJECT_DIR up -d"
