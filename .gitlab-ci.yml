stages:
  - prepare
  - release

.docker-login: &docker-login
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

workflow:
  rules:
    - if: $CI_COMMIT_TAG == "staging"

variables:
  TARGET_APPS: dispensing-manager-ui machines multi-monitor planning-board planning-board-engine root websockify

prepare:
  image: node:18
  stage: prepare
  script:
    - npm install -g turbo
    - |
      for APP_NAME in $TARGET_APPS; do
        npx turbo prune --scope=$APP_NAME --out-dir out-$APP_NAME --docker
      done
  artifacts:
    paths:
      - out-*/

release:
  stage: release
  tags: [docker]
  variables:
    NPM_TOKEN: $CI_JOB_TOKEN
    TURBO_TOKEN: $TURBO_TOKEN
  before_script:
    - apk add --no-cache jq
    - *docker-login
  script:
    - mkdir release-errors
    - |
      for APP_NAME in $TARGET_APPS; do
        rm -rf out && mv out-$APP_NAME out
        exec 3>&1
        ./scripts/release.sh $APP_NAME 2>&1 1>&3 3>&- | tee release-errors/$APP_NAME.log
      done
    - '[ -z $(ls -A ./release-errors) ] && exit 1'
  artifacts:
    name: release-errors
    paths:
      - release-errors/
    when: on_failure
