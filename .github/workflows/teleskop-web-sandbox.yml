name: eliarelektronik/dijital_boyahane/intern/teleskop-web-sandbox
on:
  push:
  workflow_dispatch:

concurrency:
  group: '${{ github.ref }}'
  cancel-in-progress: true

env:
  TURBO_TOKEN: '${{ secrets.TURBO_TOKEN }}'
  TURBO_CONFIG: '{}'
  TURBO_FORCE: 'false'
  CI_COMMIT_TAG: ${{ github.ref_name }}
  CI_COMMIT_SHA: ${{ github.sha }}
  CI_PROJECT_PATH: ${{ github.repository }}
  CI_REGISTRY_IMAGE: ghcr.io/${{ github.repository }}
  TARGET_APPS: archive recipes dispensing-manager-ui communication-driver machine-status machines migration-service multi-monitor planning-board planning-board-engine root websockify program-editor

jobs:
  classify-ref:
    runs-on: ubuntu-latest
    outputs:
      app_rules: ${{ steps.ref.outputs.app_rules }}
      hotfix: ${{ steps.ref.outputs.hotfix }}
      devops: ${{ steps.ref.outputs.devops }}
      merge_request: ${{ steps.ref.outputs.merge_request }}
      dev_branch: ${{ steps.ref.outputs.dev_branch }}
      app_name: ${{ steps.ref.outputs.app_name }}
      tag_version: ${{ steps.ref.outputs.tag_version }}
      rebuild_apps: ${{ steps.detect.outputs.rebuild_apps }}
      retag_apps: ${{ steps.detect.outputs.retag_apps }}

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect file changes
        id: detect
        run: |
          export FILE_CHANGES=$(node ./scripts/detect-file-change.js)

          rebuild_apps=$(echo $FILE_CHANGES | jq -c '.targetApps')
          echo $rebuild_apps
          echo "rebuild_apps=${rebuild_apps}" >> "$GITHUB_OUTPUT"

          retag_apps=$(echo $FILE_CHANGES | jq -c '.retagApps')
          echo $retag_apps
          echo "retag_apps=${retag_apps}" >> "$GITHUB_OUTPUT"


      - id: ref
        shell: bash
        run: |
          REF="${GITHUB_REF}"
          REF_NAME="${GITHUB_REF_NAME}"

          echo "app_rules=false" >> "$GITHUB_OUTPUT"
          echo "hotfix=false" >> "$GITHUB_OUTPUT"
          echo "devops=false" >> "$GITHUB_OUTPUT"
          echo "merge_request=false" >> "$GITHUB_OUTPUT"
          echo "dev_branch=false" >> "$GITHUB_OUTPUT"

          # GitLab .app-rules:
          # /^v\d+\.\d+\.\d+(-rc\.\d+)?$/
          if [[ "$REF" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]; then
            echo "app_rules=true" >> "$GITHUB_OUTPUT"
            echo "tag_version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

          # GitLab .app-rules branch:
          if [[ "$REF" == "refs/heads/dev" ]]; then
            echo "dev_branch=true" >> "$GITHUB_OUTPUT"
            echo "app_rules=true" >> "$GITHUB_OUTPUT"
          fi

          # GitLab .hotfix-rules:
          # /^[a-z._-]+@\d+\.\d+\.\d+-hotfix\d+$/
          if [[ "$REF" =~ ^refs/tags/[a-z._-]+@[0-9]+\.[0-9]+\.[0-9]+-hotfix[0-9]+$ ]]; then
            echo "hotfix=true" >> "$GITHUB_OUTPUT"
            echo "app_name=${REF_NAME%@*}" >> "$GITHUB_OUTPUT"
          fi

          # GitLab .devops-rules:
          # /^devops@/
          if [[ "$REF" =~ ^refs/tags/devops@ ]]; then
            echo "devops=true" >> "$GITHUB_OUTPUT"
            echo "tag_version=${REF_NAME#devops@}" >> "$GITHUB_OUTPUT"
          fi

          # GitLab .merge-request-rules:
          # merge_request_event && target == default branch
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.base_ref }}" == "${{ github.event.repository.default_branch }}" ]]; then
            echo "merge_request=true" >> "$GITHUB_OUTPUT"
          fi

  release-devops-packages:
    needs:
      - classify-ref
    runs-on: ubuntu-latest
    container:
      image: node:22
    if: ${{ needs.classify-ref.outputs.devops == 'true' }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4.1.0
        with:
          fetch-depth: 20
          lfs: true

      # prepare hot-fix
      - run: npm install -g turbo@^2
      - run: export APP_NAME=$(echo ${{ github.ref }} | sed -E 's/^([a-z._-]+)@.*/\1/')
      - run: turbo prune --scope=$APP_NAME --out-dir out --docker

      - run: apt update && apt install -y jq
      - run: corepack enable
      - run: npm install -g turbo@^2
      - run: echo "@${{ github.repository_owner }}:registry=${{ github.api_url }}/projects/${{ github.repository }}/packages/npm/" >> .npmrc
      - run: echo "//npm.pkg.github.com/:_authToken=${{ github.token }}" >> .npmrc
      - run: echo "TAG_VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV
      - run: ./scripts/publish-package @eliarelektronik/samba-env $TAG_VERSION

  prepare-and-release-apps:
    needs:
      - classify-ref
    runs-on: ubuntu-latest
    # runs-on:
    #   - self-hosted
    #   - docker
    if: ${{ needs.classify-ref.outputs.app_rules == 'true' }}
    timeout-minutes: 60
    continue-on-error: true
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: ${{ fromJSON(needs.classify-ref.outputs.rebuild_apps) }}
    steps:

      - uses: actions/checkout@v4.1.0
        with:
          fetch-depth: 20
          lfs: true
      - run: npm install -g turbo@^2

      - run: turbo prune --scope=${{ matrix.app }} --out-dir out-${{ matrix.app }} --docker

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # - run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor || github.event.actor }} --password-stdin

      - run: |
          # Variables for docker bake
          echo APP_NAME=${{ matrix.app }} >> $GITHUB_ENV
          echo APP_ROLES="$(jq -Mc '.roles // []' "apps/${{ matrix.app }}/manifest.json" 2> /dev/null || echo '[]')" >> $GITHUB_ENV
          rm -rf out && mv out-${{ matrix.app }} out

      - run: mkdir release-logs
      - run: export ERRORS="" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/bake-action@v7
        with:
          source: .
          files: docker-bake.hcl
          targets: ${{ matrix.app }}
          push: true

  prepare-and-release-hotfix:
    needs:
      - classify-ref
    runs-on:
      - self-hosted
      - docker
    if: ${{ needs.classify-ref.outputs.hotfix == 'true' }}
    timeout-minutes: 60
    strategy:
      matrix:
        app: ${{ fromJSON(needs.classify-ref.outputs.rebuild_apps) }}
    steps:
      - uses: actions/checkout@v4.1.0
        with:
          fetch-depth: 20
          lfs: true

      # prepare hot-fix
      - run: npm install -g turbo@^2
      - run: export APP_NAME=$(echo ${{ github.ref }} | sed -E 's/^([a-z._-]+)@.*/\1/')
      - run: turbo prune --scope=$APP_NAME --out-dir out --docker

      # release hot-fix
      - run: apk add --no-cache jq

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # - run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.events.actor }} --password-stdin

      - run: docker context create github-context
      - run: docker buildx create --name github-builder --driver docker-container --use github-context
      - run: docker buildx inspect --bootstrap
      - run: export APP_NAME=$(echo ${{ github.ref }} | sed -E 's/^([a-z._-]+)@.*/\1/')
      - run: export APP_ROLES="$(jq -Mc '.roles // []' "apps/${{ matrix.app }}/manifest.json" 2> /dev/null || echo '[]')"
      - run: docker buildx bake "${{ matrix.app }}" --push 2>&1 ||  exit 1
